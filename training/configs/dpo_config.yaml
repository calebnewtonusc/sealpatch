# Stage 3: DPO config — GreenLight CI
# Run: deepspeed --num_gpus=18 training/train_dpo.py

model:
  base_model: "Qwen/Qwen2.5-7B-Coder-Instruct"
  rl_adapter: "./checkpoints/rl"
  output_dir: "./checkpoints/greenlight-final"

dpo:
  learning_rate: 1.0e-6
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  beta: 0.1
  max_length: 8192
  max_prompt_length: 4096
  bf16: true
  gradient_checkpointing: true

logging:
  logging_steps: 10
  save_steps: 100
  run_name: "greenlight-ci-dpo-v1"

data:
  dpo_pairs_path: "./data/training/dpo_pairs.jsonl"
