version: "3.9"

services:
  sealpatch-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: sealpatch-api:latest
    container_name: sealpatch-api
    ports:
      - "8080:8080"
    environment:
      - SEALPATCH_MODEL=/models/sealpatch-final
      - VLLM_BASE_URL=http://vllm-server:8001/v1
      - USE_VLLM=1
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - NVD_API_KEY=${NVD_API_KEY}
      - GRYPE_BIN=/usr/local/bin/grype
      - TRIVY_BIN=/usr/local/bin/trivy
      - MIN_SEVERITY=HIGH
    volumes:
      - model-weights:/models
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - vllm-server
      - sealpatch-sandbox
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  sealpatch-sandbox:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: sealpatch-api:latest
    container_name: sealpatch-sandbox
    command: ["python", "agents/validation_agent.py", "--serve", "--port", "8083"]
    ports:
      - "8083:8083"
    environment:
      - GRYPE_BIN=/usr/local/bin/grype
      - TRIVY_BIN=/usr/local/bin/trivy
      - DOCKER_BIN=docker
      - PATCH_TIMEOUT=300
      - SMOKE_TEST_TIMEOUT=60
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  scan-agent:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: sealpatch-api:latest
    container_name: sealpatch-scan
    command: ["python", "agents/scan_agent.py", "--batch-mode", "--workers", "8"]
    environment:
      - GRYPE_BIN=/usr/local/bin/grype
      - TRIVY_BIN=/usr/local/bin/trivy
    volumes:
      - scan-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock

  vllm-server:
    image: vllm/vllm-openai:latest
    container_name: sealpatch-vllm
    ports:
      - "8001:8001"
    volumes:
      - model-weights:/models
    command:
      - "--model=/models/sealpatch-final"
      - "--served-model-name=sealpatch"
      - "--port=8001"
      - "--tensor-parallel-size=2"
      - "--max-model-len=16384"
      - "--dtype=bfloat16"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 2
              capabilities: [gpu]
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: sealpatch-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - sealpatch-api
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: sealpatch-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

volumes:
  model-weights:
    driver: local
  scan-data:
    driver: local
